<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GUNNNZ CAR BLE</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- Background container -->
  <div class="background-container"></div>

  <!-- Login Modal -->
  <div class="login-modal" id="loginModal">
    <div class="login-container">
      <div class="login-header">
        <h1 class="login-title">🔐 GUNNNZ CAR BLE</h1>
        <p class="login-subtitle">Đăng nhập để tiếp tục</p>
      </div>
      
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required 
                 autocomplete="off" tabindex="1">
        </div>
        
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required 
                 autocomplete="off" tabindex="2">
        </div>
        
        <div class="login-error" id="loginError"></div>
        
        <button type="submit" class="login-btn" tabindex="3">
          <span>Đăng nhập</span>
        </button>
      </form>
      
      <div class="login-info">
        <p>ℹ️ Thông tin mặc định:</p>
        <p><strong>Tên:</strong> admin</p>
        <p><strong>Mật khẩu:</strong> *****</p>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="app-container" id="appContainer">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <!-- BLE connect/disconnect toggle button. color and click action changes based on connection state -->
        <button class="ble-btn disconnected" id="connectBtn" onclick="toggleConnection()">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z" fill="currentColor"/>
          </svg>
        </button>
        <button class="logout-btn" id="logoutBtn" onclick="handleLogout(event)" title="Đăng xuất">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <h1 class="title">GUNNNZ CAR BLE</h1>
      <div class="header-right">
        <!-- open statistics in new tab and disconnect BLE before navigating -->
        <a href="statistics.html" class="stats-btn" title="View Statistics" target="_blank" rel="noopener" onclick="manualDisconnect();">📊</a>
        <div class="clock-container">
          <div class="clock-time" id="clock">00:00:00</div>
          <div class="clock-date" id="date">01/01/2026</div>
        </div>
      </div>
    </header>

    <!-- Main Control Area -->
    <div class="main-control">
      <!-- Left Joystick -->
      <div class="joystick-container">
        <div class="joystick">
          <button class="arrow-btn up" id="fwdBtn" disabled>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
              <path d="M7 14l5-5 5 5z" fill="currentColor"/>
            </svg>
          </button>
          <div class="center-dot"></div>
          <button class="arrow-btn down" id="bckBtn" disabled>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
              <path d="M7 10l5 5 5-5z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Status Display -->
      <div class="status-container">
        <div class="status-box">
          <span class="status-label">STATUS:</span>
          <span class="status-text" id="status">Disconnected</span>
        </div>
      </div>

      <!-- Right Joystick -->
      <div class="joystick-container">
        <div class="joystick">
          <button class="arrow-btn left" id="leftBtn" disabled>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
              <path d="M14 7l-5 5 5 5z" fill="currentColor"/>
            </svg>
          </button>
          <div class="center-dot"></div>
          <button class="arrow-btn right" id="rightBtn" disabled>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
              <path d="M10 7l5 5-5 5z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-section">
      <!-- Speed Control -->
      <div class="speed-section">
        <div class="speed-header">
          <span class="speed-label">SPEED:</span>
          <span class="speed-value" id="speedValue">200</span>
        </div>
        <div class="speed-slider-container">
          <input type="range" class="speed-slider" id="speedSlider" 
                 min="180" max="255" value="200" disabled 
                 oninput="setSpeed(this.value)">
        </div>
      </div>

      <!-- LED Controls -->
      <div class="led-section">
        <div class="led-title">LIGHTTING</div>
        <div class="led-buttons">
          <button class="led-circle" id="ledFrontBtn" disabled>
            <span>F</span>
          </button>
          <button class="led-circle" id="ledBackBtn" disabled>
            <span>B</span>
          </button>
          <button class="led-circle" id="ledBlinkBtn" disabled>
            <span>A</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Configuration -->
  <script src="firebase-config.js"></script>
  <!-- Firebase Tracker -->
  <script src="firebase-tracker.js"></script>
  <!-- Main App -->
  <script src="app.js"></script>
</body>
</html>
